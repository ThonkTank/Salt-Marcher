name: promote-stable

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: read
  actions: read

jobs:
  promote-stable:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - run: python3 tools/quality/scripts/promote_stable.py
      - if: always()
        run: python3 tools/quality/scripts/update_status_issue.py
