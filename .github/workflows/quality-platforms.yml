name: quality-platforms

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

concurrency:
  group: quality-platforms-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  production-handoff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
      - run: tools/gradle/run-staged-verification.sh production-handoff

  warden-freeze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - run: python3 tools/quality/scripts/warden_freeze.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  behavior-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
      - name: Select behavior harnesses
        id: select
        run: |
          python3 tools/quality/scripts/select_harnesses.py --base-ref "$BASE_REF" > /tmp/harnesses.txt
          if [ ! -s /tmp/harnesses.txt ]; then
            echo "no behavior surface touched"
            echo "has_harnesses=false" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/harnesses.txt
            echo "has_harnesses=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          BASE_REF: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_ref || github.base_ref }}
      - name: Run selected harnesses
        if: steps.select.outputs.has_harnesses == 'true'
        run: |
          while IFS= read -r harness; do
            xvfb-run -a tools/gradle/run-observable-gradle.sh "$harness"
          done < /tmp/harnesses.txt

  judge-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: build/judge-review-counter.json
          key: judge-review-${{ github.run_id }}
          restore-keys: judge-review-
      - run: python3 tools/agents/judge_review.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JUDGE_MODEL: ${{ vars.JUDGE_MODEL }}
          JUDGE_MAX_CALLS_PER_DAY: 30

  ckjm-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
      - run: tools/gradle/run-observable-gradle.sh ckjmMain
        continue-on-error: true
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ckjm-report
          path: build/reports/ckjm

  sonarcloud:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
    steps:
      - name: Check SonarCloud configuration
        id: sonar-config
        run: |
          missing=""
          if [ -z "$SONAR_TOKEN" ]; then
            missing="${missing} SONAR_TOKEN"
          fi
          if [ -z "$SONAR_ORGANIZATION" ]; then
            missing="${missing} SONAR_ORGANIZATION"
          fi
          if [ -z "$SONAR_PROJECT_KEY" ]; then
            missing="${missing} SONAR_PROJECT_KEY"
          fi
          if [ -n "$missing" ]; then
            echo "SonarCloud advisory analysis skipped; missing configuration:${missing}."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.sonar-config.outputs.configured == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - if: steps.sonar-config.outputs.configured == 'true'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - if: steps.sonar-config.outputs.configured == 'true'
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - name: Install ImageMagick
        if: steps.sonar-config.outputs.configured == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
      - if: steps.sonar-config.outputs.configured == 'true'
        run: >
          ./gradlew sonar --console=plain
          -Dsonar.token="$SONAR_TOKEN"
          -Dsonar.organization="$SONAR_ORGANIZATION"
          -Dsonar.projectKey="$SONAR_PROJECT_KEY"
          -Dsonar.qualitygate.wait=true
        continue-on-error: true

  codescene:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - run: python3 tools/quality/scripts/codescene_delta.py
        continue-on-error: true
        env:
          CODESCENE_API_TOKEN: ${{ secrets.CODESCENE_API_TOKEN }}
          CODESCENE_BASE_URL: ${{ vars.CODESCENE_BASE_URL }}
          CODESCENE_PROJECT_ID: ${{ vars.CODESCENE_PROJECT_ID }}
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: codescene-report
          path: build/reports/codescene
