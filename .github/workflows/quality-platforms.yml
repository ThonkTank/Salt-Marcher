name: quality-platforms

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

concurrency:
  group: quality-platforms-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  production-handoff:
    runs-on: ubuntu-latest
    env:
      SALT_MARCHER_HARNESS_MAP_BASE_REF: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_ref || github.base_ref }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
      - run: tools/gradle/run-staged-verification.sh production-handoff
      - name: Prepare quality trend gate metadata
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            jq -c '.pull_request.labels' "$GITHUB_EVENT_PATH" > /tmp/pr-labels.json
            jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH" > /tmp/pr-body.txt
          else
            pr_json="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/pulls" --jq '.[0] // {}')"
            printf '%s' "$pr_json" | jq -c '.labels // []' > /tmp/pr-labels.json
            printf '%s' "$pr_json" | jq -r '.body // ""' > /tmp/pr-body.txt
          fi
          {
            printf 'PR_LABELS_JSON<<EOF\n'
            cat /tmp/pr-labels.json
            printf '\nEOF\n'
            printf 'PR_BODY<<EOF\n'
            cat /tmp/pr-body.txt
            printf '\nEOF\n'
          } >> "$GITHUB_ENV"
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.event_name == 'merge_group' && github.event.merge_group.head_sha || github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Use base quality delta script
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        run: |
          git fetch --no-tags origin "$BASE_REF"
          if git cat-file -e "origin/$BASE_REF:tools/quality/scripts/quality_delta.py"; then
            git checkout "origin/$BASE_REF" -- tools/quality/scripts/quality_delta.py
          fi
        env:
          BASE_REF: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_ref || github.base_ref }}
      - name: Enforce refactor-intent quality trend
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        run: python3 tools/quality/scripts/quality_delta.py --enforce quality,consolidation,architecture --require-benefit

  warden-freeze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Use base warden script
        if: github.event_name != 'push'
        run: |
          git fetch --no-tags origin "$BASE_REF"
          git checkout "origin/$BASE_REF" -- tools/quality/scripts/warden_freeze.py
        env:
          BASE_REF: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_ref || github.base_ref }}
      - run: python3 tools/quality/scripts/warden_freeze.py --self-test
      - run: python3 tools/quality/scripts/warden_freeze.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  behavior-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
      - name: Select behavior harnesses
        id: select
        run: |
          if [ -n "$BASE_REF" ]; then
            git fetch --no-tags origin "$BASE_REF"
            git checkout "origin/$BASE_REF" -- tools/quality/scripts/select_harnesses.py
          fi
          python3 tools/quality/scripts/select_harnesses.py --base-ref "$BASE_REF" > /tmp/harnesses.txt
          if [ ! -s /tmp/harnesses.txt ]; then
            echo "no behavior surface touched"
            echo "has_harnesses=false" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/harnesses.txt
            echo "has_harnesses=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          BASE_REF: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_ref || github.base_ref }}
      - name: Run selected harnesses
        if: steps.select.outputs.has_harnesses == 'true'
        run: |
          while IFS= read -r harness; do
            xvfb-run -a tools/gradle/run-observable-gradle.sh "$harness"
          done < /tmp/harnesses.txt

  judge-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - run: npm install -g @anthropic-ai/claude-code@2.1.201
      - name: Use base judge script
        if: github.event_name != 'push'
        run: |
          git fetch --no-tags origin "$BASE_REF"
          git checkout "origin/$BASE_REF" -- tools/agents/judge_review.py
        env:
          BASE_REF: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_ref || github.base_ref }}
      - run: python3 tools/agents/judge_review.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN || secrets.ANTHROPIC_AUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JUDGE_MODEL: ${{ vars.JUDGE_MODEL }}

  ckjm-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
      - run: tools/gradle/run-observable-gradle.sh ckjmMain
        continue-on-error: true
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ckjm-report
          path: build/reports/ckjm

  quality-trend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - name: Prepare quality trend advisory metadata
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            jq -c '.pull_request.labels' "$GITHUB_EVENT_PATH" > /tmp/pr-labels.json
            jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH" > /tmp/pr-body.txt
          else
            pr_json="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/pulls" --jq '.[0] // {}')"
            printf '%s' "$pr_json" | jq -c '.labels // []' > /tmp/pr-labels.json
            printf '%s' "$pr_json" | jq -r '.body // ""' > /tmp/pr-body.txt
          fi
          {
            printf 'PR_LABELS_JSON<<EOF\n'
            cat /tmp/pr-labels.json
            printf '\nEOF\n'
            printf 'PR_BODY<<EOF\n'
            cat /tmp/pr-body.txt
            printf '\nEOF\n'
          } >> "$GITHUB_ENV"
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.event_name == 'merge_group' && github.event.merge_group.head_sha || github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute quality trend
        run: python3 tools/quality/scripts/quality_delta.py --require-benefit
        continue-on-error: true
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: quality-trend
          path: build/reports/quality-trend

  sonarcloud:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
    steps:
      - name: Check SonarCloud configuration
        id: sonar-config
        run: |
          missing=""
          if [ -z "$SONAR_TOKEN" ]; then
            missing="${missing} SONAR_TOKEN"
          fi
          if [ -z "$SONAR_ORGANIZATION" ]; then
            missing="${missing} SONAR_ORGANIZATION"
          fi
          if [ -z "$SONAR_PROJECT_KEY" ]; then
            missing="${missing} SONAR_PROJECT_KEY"
          fi
          if [ -n "$missing" ]; then
            echo "SonarCloud advisory analysis skipped; missing configuration:${missing}."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.sonar-config.outputs.configured == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - if: steps.sonar-config.outputs.configured == 'true'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - if: steps.sonar-config.outputs.configured == 'true'
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - name: Install ImageMagick
        if: steps.sonar-config.outputs.configured == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
      - if: steps.sonar-config.outputs.configured == 'true'
        run: >
          ./gradlew sonar --console=plain
          -Dsonar.token="$SONAR_TOKEN"
          -Dsonar.organization="$SONAR_ORGANIZATION"
          -Dsonar.projectKey="$SONAR_PROJECT_KEY"
          -Dsonar.qualitygate.wait=true
        continue-on-error: true

  codescene:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    env:
      CODESCENE_API_TOKEN: ${{ secrets.CODESCENE_API_TOKEN }}
      CODESCENE_BASE_URL: ${{ vars.CODESCENE_BASE_URL }}
      CODESCENE_PROJECT_ID: ${{ vars.CODESCENE_PROJECT_ID }}
      CODESCENE_REPOSITORY: ${{ vars.CODESCENE_REPOSITORY }}
      CODESCENE_DELTA_ENDPOINT: ${{ vars.CODESCENE_DELTA_ENDPOINT }}
      CODESCENE_BASIC_USER: ${{ vars.CODESCENE_BASIC_USER }}
      CODESCENE_OFFLINE_MODE: ${{ vars.CODESCENE_OFFLINE_MODE }}
      CODESCENE_TIMEOUT_SECONDS: ${{ vars.CODESCENE_TIMEOUT_SECONDS }}
      CODESCENE_POLL_SECONDS: ${{ vars.CODESCENE_POLL_SECONDS }}
    steps:
      - name: Check CodeScene configuration
        id: codescene-config
        run: |
          missing=""
          if [ -z "$CODESCENE_API_TOKEN" ]; then
            missing="${missing} CODESCENE_API_TOKEN"
          fi
          if [ -z "$CODESCENE_DELTA_ENDPOINT" ] && { [ -z "$CODESCENE_BASE_URL" ] || [ -z "$CODESCENE_PROJECT_ID" ]; }; then
            missing="${missing} CODESCENE_DELTA_ENDPOINT-or-CODESCENE_BASE_URL+CODESCENE_PROJECT_ID"
          fi
          if [ -n "$missing" ]; then
            echo "CodeScene advisory analysis skipped; missing configuration:${missing}."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.codescene-config.outputs.configured == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - if: steps.codescene-config.outputs.configured == 'true'
        run: python3 tools/quality/scripts/codescene_delta.py
        continue-on-error: true
      - if: always() && steps.codescene-config.outputs.configured == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: codescene-report
          path: build/reports/codescene
