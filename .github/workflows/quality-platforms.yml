name: quality-platforms

on:
  pull_request:
    # `labeled`/`unlabeled` are required: warden-freeze and judge-review read the
    # risk label, so a label added after opening must re-run the required checks.
    types: [opened, synchronize, reopened, labeled, unlabeled]
  merge_group:
  push:
    branches:
      - main
  schedule:
    - cron: "17 2 * * *"

concurrency:
  group: quality-platforms-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          cache-read-only: ${{ github.event_name != 'push' }}
      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
      - name: Decide Gradle check arguments
        id: check-args
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          PUSH_BEFORE: ${{ github.event.before || '' }}
          CURRENT_SHA: ${{ github.sha }}
          BASE_REF: ${{ github.event.merge_group.base_ref || github.base_ref || '' }}
        run: |
          set -euo pipefail

          zero_sha="0000000000000000000000000000000000000000"
          base=""
          head=""
          diff_resolution_failed="false"

          case "$EVENT_NAME" in
            pull_request)
              base="$PR_BASE_SHA"
              head="$PR_HEAD_SHA"
              ;;
            merge_group)
              base_ref="${BASE_REF#refs/heads/}"
              if ! git fetch --no-tags origin "$base_ref"; then
                diff_resolution_failed="true"
              elif ! base="$(git merge-base HEAD "origin/$base_ref")"; then
                diff_resolution_failed="true"
              else
                head="HEAD"
              fi
              ;;
            push)
              base="$PUSH_BEFORE"
              head="$CURRENT_SHA"
              if [ -z "$base" ] || [ "$base" = "$zero_sha" ]; then
                if ! base="$(git rev-list --max-parents=0 "$head")"; then
                  diff_resolution_failed="true"
                fi
              fi
              ;;
          esac

          extra_args=""
          mode="content-addressed"
          if [ "$diff_resolution_failed" = "true" ] || [ -z "$base" ] || [ -z "$head" ]; then
            mode="forced-rerun-undetermined-diff"
            extra_args="-- --rerun-tasks"
          elif ! changed_files="$(git diff --name-only "$base" "$head")"; then
            mode="forced-rerun-diff-read-failed"
            extra_args="-- --rerun-tasks"
          else
            build_wiring_pattern='^(\.github/workflows/|build\.gradle\.kts$|settings\.gradle\.kts$|gradle\.properties$|gradle/|gradlew(\.bat)?$|build-logic/|build-logic-settings/|tools/gradle/|tools/hooks/|tools/quality/config/frozen-surfaces\.txt$|tools/quality/scripts/(branch_protection_readback|update_status_issue|warden_freeze)\.py$|tools/agents/judge_review\.py$)'
            if printf '%s\n' "$changed_files" | grep -Eq "$build_wiring_pattern"; then
              mode="forced-rerun-build-wiring"
              extra_args="-- --rerun-tasks"
            fi
          fi

          echo "mode=$mode"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "extra_args=$extra_args" >> "$GITHUB_OUTPUT"
      - run: xvfb-run -a tools/gradle/run-observable-gradle.sh check ${{ steps.check-args.outputs.extra_args }}

  nightly-rerun-tasks:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          cache-read-only: true
      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
      - run: xvfb-run -a tools/gradle/run-observable-gradle.sh check -- --rerun-tasks

  warden-freeze:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Use base warden script
        if: github.event_name != 'push'
        run: |
          cp tools/quality/config/frozen-surfaces.txt "$RUNNER_TEMP/frozen-surfaces.pr"
          git fetch --no-tags origin "$BASE_REF"
          git checkout "origin/$BASE_REF" -- tools/quality/scripts/warden_freeze.py tools/quality/config/frozen-surfaces.txt
          python3 tools/quality/scripts/warden_freeze.py --self-test
          cp "$RUNNER_TEMP/frozen-surfaces.pr" tools/quality/config/frozen-surfaces.txt
        env:
          BASE_REF: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_ref || github.base_ref }}
      - if: github.event_name == 'push'
        run: python3 tools/quality/scripts/warden_freeze.py --self-test
      - run: python3 tools/quality/scripts/warden_freeze.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  judge-review:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - run: npm install -g @anthropic-ai/claude-code@2.1.201
      - name: Use base judge script
        if: github.event_name != 'push'
        run: |
          git fetch --no-tags origin "$BASE_REF"
          git checkout "origin/$BASE_REF" -- tools/agents/judge_review.py
        env:
          BASE_REF: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_ref || github.base_ref }}
      - run: python3 tools/agents/judge_review.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN || secrets.ANTHROPIC_AUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JUDGE_MODEL: ${{ vars.JUDGE_MODEL }}

  ckjm-report:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          cache-read-only: ${{ github.event_name != 'push' }}
      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
      - run: tools/gradle/run-observable-gradle.sh ckjmMain
        continue-on-error: true
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ckjm-report
          path: build/reports/ckjm

  sonarcloud:
    if: github.event_name != 'schedule' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
    steps:
      - name: Check SonarCloud configuration
        id: sonar-config
        run: |
          missing=""
          if [ -z "$SONAR_TOKEN" ]; then
            missing="${missing} SONAR_TOKEN"
          fi
          if [ -z "$SONAR_ORGANIZATION" ]; then
            missing="${missing} SONAR_ORGANIZATION"
          fi
          if [ -z "$SONAR_PROJECT_KEY" ]; then
            missing="${missing} SONAR_PROJECT_KEY"
          fi
          if [ -n "$missing" ]; then
            echo "SonarCloud advisory analysis skipped; missing configuration:${missing}."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.sonar-config.outputs.configured == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - if: steps.sonar-config.outputs.configured == 'true'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - if: steps.sonar-config.outputs.configured == 'true'
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          cache-read-only: ${{ github.event_name != 'push' }}
      - name: Install ImageMagick
        if: steps.sonar-config.outputs.configured == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
      - if: steps.sonar-config.outputs.configured == 'true'
        run: >
          ./gradlew sonar --console=plain
          -Dsonar.token="$SONAR_TOKEN"
          -Dsonar.organization="$SONAR_ORGANIZATION"
          -Dsonar.projectKey="$SONAR_PROJECT_KEY"
          -Dsonar.qualitygate.wait=true
        continue-on-error: true

  codescene:
    if: github.event_name != 'schedule' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    env:
      CODESCENE_API_TOKEN: ${{ secrets.CODESCENE_API_TOKEN }}
      CODESCENE_BASE_URL: ${{ vars.CODESCENE_BASE_URL }}
      CODESCENE_PROJECT_ID: ${{ vars.CODESCENE_PROJECT_ID }}
      CODESCENE_REPOSITORY: ${{ vars.CODESCENE_REPOSITORY }}
      CODESCENE_DELTA_ENDPOINT: ${{ vars.CODESCENE_DELTA_ENDPOINT }}
      CODESCENE_BASIC_USER: ${{ vars.CODESCENE_BASIC_USER }}
      CODESCENE_OFFLINE_MODE: ${{ vars.CODESCENE_OFFLINE_MODE }}
      CODESCENE_TIMEOUT_SECONDS: ${{ vars.CODESCENE_TIMEOUT_SECONDS }}
      CODESCENE_POLL_SECONDS: ${{ vars.CODESCENE_POLL_SECONDS }}
    steps:
      - name: Check CodeScene configuration
        id: codescene-config
        run: |
          missing=""
          if [ -z "$CODESCENE_API_TOKEN" ]; then
            missing="${missing} CODESCENE_API_TOKEN"
          fi
          if [ -z "$CODESCENE_DELTA_ENDPOINT" ] && { [ -z "$CODESCENE_BASE_URL" ] || [ -z "$CODESCENE_PROJECT_ID" ]; }; then
            missing="${missing} CODESCENE_DELTA_ENDPOINT-or-CODESCENE_BASE_URL+CODESCENE_PROJECT_ID"
          fi
          if [ -n "$missing" ]; then
            echo "CodeScene advisory analysis skipped; missing configuration:${missing}."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.codescene-config.outputs.configured == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - if: steps.codescene-config.outputs.configured == 'true'
        run: python3 tools/quality/scripts/codescene_delta.py
        continue-on-error: true
      - if: always() && steps.codescene-config.outputs.configured == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: codescene-report
          path: build/reports/codescene
