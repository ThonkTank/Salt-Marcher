name: quality-platforms

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

concurrency:
  group: quality-platforms-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  production-handoff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: tools/gradle/run-staged-verification.sh production-handoff

  ckjm-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: tools/gradle/run-observable-gradle.sh ckjmMain
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ckjm-report
          path: build/reports/ckjm

  sonarcloud:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: >
          ./gradlew sonar --console=plain
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
          -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
          -Dsonar.qualitygate.wait=true

  codescene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: python3 tools/quality/scripts/codescene_delta.py
        env:
          CODESCENE_API_TOKEN: ${{ secrets.CODESCENE_API_TOKEN }}
          CODESCENE_BASE_URL: ${{ vars.CODESCENE_BASE_URL }}
          CODESCENE_PROJECT_ID: ${{ vars.CODESCENE_PROJECT_ID }}
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codescene-report
          path: build/reports/codescene
