name: Bugreport
description: Melde etwas, das nicht wie erwartet funktioniert.
title: "[Bug] "
labels: ["bug", "owner-feedback"]
body:
  - type: textarea
    id: steps
    attributes:
      label: Was hast du getan?
      description: Beschreibe die Schritte so konkret wie möglich.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Was hast du erwartet?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Was ist passiert?
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Wie schlimm ist es?
      options:
        - P0 blockiert
        - P1 wichtig
        - P2 stoerend
        - P3 nice-to-have
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Welche Stelle der App?
      options:
        - Hex-Karte
        - Dungeon-Editor
        - Session Planner
        - World Planner
        - Katalog
        - Reise/Travel
        - Encounter
        - Party
        - Sonstiges
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshot/Video oder weitere Hinweise
  - type: textarea
    id: acceptance
    attributes:
      label: Wann waerst du zufrieden?
      description: "Fertig heisst fuer mich..."
    validations:
      required: true
